<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">  
</head>

<body class="bg-gray-100">

  <div class="max-w-4xl mx-auto p-5">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">🛒 Cart</h1>
    <div id="cart-items" class="space-y-4"></div>

    <div class="bg-white p-5 rounded-xl shadow mt-6 flex justify-between items-center">
      <h2 class="text-xl font-semibold">Total</h2>
      <span class="text-2xl font-bold text-green-600">$<span id="total">0</span></span>
    </div>
    <div class="mt-6">
      <a href="index.html" 
         class="bg-gray-800 hover:bg-gray-900 text-white px-5 py-2 rounded-lg">
        <i class="fa-solid fa-arrow-left"></i> Continue Shopping
      </a>
    </div>
  </div>

  <script src="cart.js"></script>
</body>
</html>
