<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="w-full h-14 shadow-lg flex justify-between items-center">
        <h1 class="text-2xl font-bold ml-2 max-sm:text-xl max-md:text-xl">My Shop</h1>
        <input type="text" id="searchInput" placeholder="Search..."
            class="ml-4 max-sm:w-28  max-md:w-44 border-b outline-none h-8">

        <div class="flex h-auto items-center">
            <select class="w-54 max-md:w-36 p-2 rounded-lg border border-gray-200 
             bg-gray-100 text-gray-800 
             focus:outline-none focus:ring-2 focus:ring-gray-300 
             cursor-pointer ml-4 max-sm:hidden " onchange="sort(this.value)">

                <option value="all">All</option>
                <option value="Low-to-Heigh">Price: Low-to-Heigh </option>
                <option value="Heigh-to-Low">Price: Heigh-to-Low</option>

            </select>

            <select class="w-54 max-md:w-36 max-md:hidden p-2 rounded-lg border border-gray-200 
             bg-gray-100 text-gray-800 
             focus:outline-none focus:ring-2 focus:ring-gray-300 
             cursor-pointer ml-4 max-sm:hidden " id="Categories" onchange="Category(this.value)">

                <option value="All">All Categories</option>
                <option value="Fashion">Fasion</option>
                <option value="Electronics">Electronics</option>

            </select>
        </div>
        <button onclick="toggleCart()"
            class="bg-blue-500 text-white px-4 py-2 rounded mr-2 max-sm:px-2 max-sm:py-1 max-sm:text-sm">
            Cart (<span id="cart-count">0</span>)
        </button>
    </header>
    <section class="p-6 grid lg:grid-cols-4 sm:grid-cols-2 md:grid-cols-3 gap-6" id="container">

    </section>

    <!-- NOT FOUND -->
    <p id="notFound" class="hidden font-bold text-2xl text-center mt-4">
        Product not found
    </p>
    <!-- CART SIDEBAR -->
    <div id="cart"
        class="fixed top-0 right-0 w-80 h-full bg-white shadow-lg p-5 transform translate-x-full transition-transform duration-300">

        <h2 class="text-xl font-bold mb-4">Shopping Cart</h2>

        <div id="cart-items" class="space-y-3"></div>

        <div class="mt-5 border-t pt-3">
            <p class="font-bold">Total: $<span id="total">0</span></p>
        </div>

        <button onclick="toggleCart()" class="mt-4 w-full bg-red-500 text-white py-2 rounded">
            Close
        </button>

    </div>

    <script src="javascript.js"></script>
</body>

</html>
