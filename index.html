<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <header class="w-full h-14 shadow-xl flex bg-white justify-between items-center">
        <h1 class="text-2xl font-bold ml-2 max-sm:text-xl max-md:text-xl">My Shop</h1>
        <input type="text" id="searchInput" placeholder="Search..."
            class="ml-4 max-sm:w-28  max-md:w-44 border-b outline-none h-8">

        <div class="flex h-auto items-center">
            <select class="w-54 max-md:w-36 p-2 rounded-lg border border-gray-200 
             bg-gray-100 text-gray-800 
             focus:outline-none focus:ring-2 focus:ring-gray-300 
             cursor-pointer ml-4 max-sm:hidden " onchange="sort(this.value)">

                <option value="all">All</option>
                <option value="Low-to-Heigh">Price: Low-to-Heigh </option>
                <option value="Heigh-to-Low">Price: Heigh-to-Low</option>

            </select>

            <select class="w-54 max-md:w-36 max-md:hidden p-2 rounded-lg border border-gray-200 
             bg-gray-100 text-gray-800 
             focus:outline-none focus:ring-2 focus:ring-gray-300 
             cursor-pointer ml-4 max-sm:hidden " id="Categories" onchange="Category(this.value)">

                <option value="All">All Categories</option>
                <option value="Fashion">Fasion</option>
                <option value="Electronics">Electronics</option>

            </select>
        </div>
        <a href="cart.html" 
            class="bg-blue-500 text-white px-4 py-2 rounded mr-2 max-sm:px-2 max-sm:py-1 max-sm:text-sm">
            Cart (<span id="cart-count">0</span>)
          </a>
    </header>
    <section class="p-2 grid lg:grid-cols-4 sm:grid-cols-2  md:grid-cols-3 gap-6" id="container">

    </section>
    <!-- Model -->
  <div id="modal" class="fixed inset-0 hidden justify-center items-center backdrop-blur-sm z-50 bg-black/20">

  <div class="bg-white/80 backdrop-blur-sm p-6 rounded-lg w-80 relative">
    
    <button onclick="closeModal()" class="absolute top-1 right-1 text-2xl"><i class="fa-solid fa-xmark"></i></button>
    
    <img id="modalImg" class="w-full mb-3 p-2 h-64 object-cover">
    <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
    <p id="modalPrice" class="font-bold  mb-3"></p>


  </div>
</div>
    <script src="javascript.js"></script>
</body>

</html>
